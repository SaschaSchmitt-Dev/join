<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog Creator</title>

    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/page-transitions.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/board-dialogs.css">
    <link rel="stylesheet" href="../styles/board-open-task-dialog.css">
</head>

<body>
    <section class="dialog-creator" aria-label="Task details">
        <header class="open-task-header">
            <span class="open-task-category user-story">User Story</span>
            <button class="open-task-close" type="button" aria-label="Close dialog">&times;</button>
        </header>
        <h1>Kochwelt Page &amp; Recipe Recommender</h1>
        <p class="open-task-description">Build start page with recipe recommendation.</p>
        <div class="open-task-row open-task-due-date">
            <span>Due date:</span><span>10/05/2023</span>
        </div>
        <div class="open-task-row">
            <span>Priority:</span>
            <span class="open-task-priority">Medium
                <img src="../assets/icons/medium-priority.png" alt="">
            </span>
        </div>
        <div class="open-task-section">
            <span>Assigned To:</span>
            <div class="open-task-contacts">
                <div class="open-task-contact">
                    <span class="dialog-contact-avatar">EM</span><span>Emmanuel Mauer</span>
                </div>
                <div class="open-task-contact">
                    <span class="dialog-contact-avatar">MB</span><span>Marcel Bauer</span>
                </div>
                <div class="open-task-contact">
                    <span class="dialog-contact-avatar">AM</span><span>Anton Mayer</span>
                </div>
            </div>
        </div>
        <div class="open-task-section">
            <span>Subtasks</span>
            <div class="open-task-subtasks">
                <label class="open-task-subtask">
                    <span class="open-task-checkbox-wrapper">
                        <input type="checkbox" checked>
                        <span class="open-task-checkbox" aria-hidden="true"></span>
                    </span>
                    <span>Implement Recipe Recommendation</span>
                </label>
                <label class="open-task-subtask">
                    <span class="open-task-checkbox-wrapper">
                        <input type="checkbox">
                        <span class="open-task-checkbox" aria-hidden="true"></span>
                    </span>
                    <span>Start Page Layout</span>
                </label>
            </div>
        </div>
        <footer class="open-task-actions">
            <button type="button"><img src="../assets/icons/delete.png" alt="">Delete</button>
            <span class="open-task-action-divider"></span>
            <button type="button"><img src="../assets/icons/edit.png" alt="">Edit</button>
        </footer>
    </section>
</body>

</html>
