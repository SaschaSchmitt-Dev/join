<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/assets.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/add-task.css">

    <script src="../script.js" defer></script>
    <script src="../templates/bars-templates.js" defer></script>
    <script src="../templates/add-task-templates.js" defer></script>
    <script src="../scripts/bars.js" defer></script>
    <script src="../scripts/add-task-dropdown-helper.js" defer></script>
    <script src="../scripts/add-task-helper.js" defer></script>
    <script src="../scripts/add-task.js" defer></script>
</head>

<body data-page="add-task">
    <aside id="sidebar" class="sidebar"></aside>

    <section class="page-content" aria-label="Seiteninhalt">
        <header id="topbar" class="topbar"></header>

        <main class="main-content addTaskContent">
            <h1 class="siteHeader">Add Task</h1>

            <form class="addTaskForm">
                <div class="addTaskFieldsLeft">
                    <label class="label" for="title">
                        Title<span class="requiredMarker">*</span>
                    </label>
                    <input class="inputField" id="title" type="text" placeholder="Enter a title">
                    <div class="errorMessage" id="titleError"></div>

                    <label class="labelTextarea" for="description">Description</label>
                    <textarea class="textarea" id="description" placeholder="Enter a Description"></textarea>

                    <label class="label" for="dueDate">
                        Due date<span class="requiredMarker">*</span>
                    </label>
                    <input class="inputField" id="dueDate" type="text" placeholder="dd/mm/yyyy">
                    <div class="errorMessage" id="dueDateError"></div>
                </div>

                <div class="horizontalDivider"></div>

                <div class="addTaskFieldsRight">
                    <div class="fieldLabel" id="priorityLabel">Priority</div>

                    <div class="priorityGroup" role="radiogroup" aria-labelledby="priorityLabel">
                        <input type="radio" name="priority" id="urgent" value="urgent" tabindex="-1" aria-hidden="true">
                        <label for="urgent" tabindex="0" role="radio">
                            Urgent
                            <img src="../assets/icons/urgent-priority.png" alt="Urgent priority icon">
                        </label>

                        <input type="radio" name="priority" id="medium" value="medium" tabindex="-1" aria-hidden="true"
                            checked>
                        <label for="medium" class="medium" tabindex="0" role="radio">
                            Medium
                            <img src="../assets/icons/medium-priority.png" alt="Medium priority icon">
                        </label>

                        <input type="radio" name="priority" id="low" value="low" tabindex="-1" aria-hidden="true">
                        <label for="low" tabindex="0" role="radio">
                            Low
                            <img src="../assets/icons/low-priority.png" alt="Low priority icon">
                        </label>
                    </div>

                    <div class="dropdownList">
                        <label for="assignetTo" class="assignetTo">Assigned to</label>

                        <div class="inputWrapper">
                            <input type="text" class="assignetTo" id="assignetTo"
                                placeholder="Select contacts to assign" readonly>
                            <img class="inputIcon" src="../assets/icons/arrow-dropdown.png"
                                alt="Toggle contacts dropdown">
                            <div class="dropdownContent"></div>
                        </div>

                        <div class="selectedContacts"></div>
                    </div>

                    <div class="dropdownList">
                        <label for="category" class="category">
                            Category<span class="requiredMarker">*</span>
                        </label>

                        <div class="inputWrapper">
                            <input type="text" class="category" id="category" placeholder="Select task category"
                                readonly>
                            <img class="inputIcon" src="../assets/icons/arrow-dropdown.png"
                                alt="Toggle category dropdown">

                            <div class="dropdownContent">
                                <a href="">Technical Task</a>
                                <a href="">User Story</a>
                            </div>
                        </div>

                        <div class="errorMessage" id="categoryError"></div>

                        <label class="label" for="subtasks">Subtasks</label>

                        <div class="subtaskInputWrapper">
                            <input class="inputField" id="subtasks" type="text" placeholder="Add new subtasks">

                            <div class="subtaskActions">
                                <button class="subtaskCancel" type="button" tabindex="0" aria-label="Discard subtask input" disabled>
                                    <img src="../assets/icons/cancel.png" alt="">
                                </button>
                                <span class="subtaskDivider"></span>
                                <button class="subtaskCheck" type="button" tabindex="0" aria-label="Add subtask" disabled>
                                    <img src="../assets/icons/check.png" alt="">
                                </button>
                            </div>
                        </div>

                        <ul class="subtaskList"></ul>
                    </div>
                </div>
            </form>

            <footer>
                <p class="requiredFieldsNotice">
                    <span class="requiredMarker">*</span>This field is required
                </p>

                <div class="footerButtons">
                    <button class="clear" type="button" onclick="clearForm()">
                        Clear
                        <img src="../assets/icons/cancel.png" alt="Cancel icon">
                    </button>

                    <button class="createTask" type="button">
                        Create Task
                        <img src="../assets/icons/check.png" alt="Check icon">
                    </button>
                </div>
            </footer>
        </main>
    </section>

    <div class="taskAddedToast">
        <span>Task added to board</span>
        <img src="../assets/icons/board.png" alt="Board icon">
    </div>
</body>

</html>
