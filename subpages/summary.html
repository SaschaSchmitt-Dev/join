<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/page-transitions.css">
    <link rel="stylesheet" href="../styles/assets.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/summary.css">
    <link rel="stylesheet" href="../style.css">

    <script src="../script.js" defer></script>
    <script src="../templates/bars-templates.js" defer></script>
    <script src="../scripts/bars.js" defer></script>
    <script src="../scripts/task-data-access.js" defer></script>
    <script src="../scripts/summary.js" defer></script>
</head>

<body data-page="summary">
    <aside id="sidebar" class="sidebar"></aside>

    <section class="page-content" aria-label="Seiteninhalt">
        <header id="topbar" class="topbar"></header>

        <main class="main-content summary-section">
            <section class="title">
                <h1>Join 360</h1>
                <div class="title-divider"></div>
                <span>Key Metrics at a Glance</span>
            </section>
            <section class="summary">
                <section class="summary-content">
                    <article class="summary-content top">
                        <a id="cardToDo" class="card top" href="./board.html">
                            <img src="../assets/icons/to-do-icon-dark.png" alt="To Do Icon">
                            <div>
                                <h4 id="summaryToDo">0</h4>
                                <p>To-do</p>
                            </div>
                        </a>
                        <a id="cardDone" class="card top" href="./board.html">
                            <img src="../assets/icons/done-icon-dark.png" alt="Done Icon">
                            <div>
                                <h4 id="summaryDone">0</h4>
                                <p>Done</p>
                            </div>
                        </a>
                    </article>
                    <article class="summary-content center">
                        <a class="card center" href="./board.html">
                            <div class="urgent-overview">
                                <img src="../assets/icons/urgent-icon.png" alt="Urgent Icon">
                                <div class="urgent-count">
                                    <h4 id="summaryUrgent">0</h4>
                                    <p>Urgent</p>
                                </div>
                            </div>
                            <div class="center-divider"></div>
                            <div class="center-right">
                                <h5 id="summaryUpcomingDeadline">No deadline</h5>
                                <p>Upcoming Deadline</p>
                            </div>
                        </a>
                    </article>
                    <article class="summary-content bottom">
                        <a class="card bottom" href="./board.html">
                            <h4 id="summaryTasksInBoard">0</h4>
                            <p>Tasks in Board</p>
                        </a>
                        <a class="card bottom" href="./board.html">
                            <h4 id="summaryTasksInProgress">0</h4>
                            <p>Tasks in Progress</p>
                        </a>
                        <a class="card bottom" href="./board.html">
                            <h4 id="summaryAwaitingFeedback">0</h4>
                            <p>Awaiting Feedback</p>
                        </a>
                    </article>
                </section>
                <section class="summary-user">
                    <h2></h2>
                    <h3 id="activeUser"></h3>
                </section>
            </section>
        </main>
    </section>
</body>

</html>
