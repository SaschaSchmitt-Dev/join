<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/add-task.css">
    <link rel="stylesheet" href="../styles/contacts.css">

    <script src="../script.js" defer></script>
    <script src="../templates/bars-templates.js" defer></script>
    <script src="../scripts/bars.js" defer></script>
    <script src="../scripts/add-task.js" defer></script>
</head>

<body data-page="add-task">
    <aside id="sidebar" class="sidebar"></aside>

    <section class="page-content" aria-label="Seiteninhalt">
        <header id="topbar" class="topbar"></header>

        <main class="main-content add-task-content">
            <h1 class="site-header">Add Task</h1>
            <form class="add-task-form">
                <div class="add-task-fields-left">
                    <label class="label" for="title">Title<span style="color: #FF8190">*</span></label>
                    <input class="input-field" id="title" type="text" placeholder="Enter a title">
                    <div class="error-message" id="title-error"></div>
                    <label class="label-textarea" for="description">Description</label>
                    <textarea class="textarea" id="description" type="text" placeholder="Enter a Description"></textarea>
                    <label class="label" for="due-date">Due date<span style="color: #FF8190">*</span></label>
                    <input class="input-field" id="due-date" type="text" placeholder="dd/mm/yyyy">
                    <div class="error-message" id="due-date-error"></div>
                </div>
                <div class="horizontal-divider"></div>
                <div class="add-task-fields-right">
                    <label for="priority">Priority</label>
                    <div class="priority-group">
                        <input type="radio" name="priority" id="urgent" value="urgent">
                        <label id="urgent" for="urgent">Urgent <img src="../assets/icons/urgent-priority.png"
                                alt=""></label>

                        <input type="radio" name="priority" id="medium" value="medium" checked>
                        <label id="medium" for="medium" class="medium">Medium <img
                                src="../assets/icons/medium-priority.png" alt=""></label>

                        <input type="radio" name="priority" id="low" value="low">
                        <label id="low" for="low">Low <img src="../assets/icons/low-priority.png" alt=""></label>
                    </div>
                    <div class="dropdown-list">
                        <label for="assignet-to" class="assignet-to">Assignet to</label>
                        <div class="input-wrapper">
                            <input type="text" class="assignet-to" id="assignet-to"
                                placeholder="Select contacts to assign">
                            <img class="input-icon" src="../assets/icons/arrow-dropdown.png" alt="">
                        </div>
                        <div class="dropdown-content"></div>
                        <div class="selected-contacts"></div>
                    </div>
                    <div class="dropdown-list">
                        <label for="category" class="category">Category<span style="color: #FF8190">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="category" id="category" placeholder="Select task category" readonly>
                            <img class="input-icon" src="../assets/icons/arrow-dropdown.png" alt="">
                            <div class="dropdown-content">
                                <a href="">Technikal task</a>
                                <a href="">User Story</a>
                            </div>
                        </div>
                        <div class="error-message" id="category-error"></div>
                        <label class="label" for="title">Subtasks</label>
                        <input class="input-field" type="text" required placeholder="Add new subtasks">
                    </div>
                </div>
            </form>
            <footer>
                <p><span style="color: #FF8190;">*</span>This field is required</p>
                <div class="footer-buttons">
                    <button class="clear" onclick="clearForm()">
                        Clear <img src="../assets/icons/cancel.png" alt="">
                    </button>
                    <button class="create-task">
                        Create Task <img src="../assets/icons/check.png" alt="">
                    </button>
                </div>
            </footer>
        </main>
    </section>
</body>

</html>
