<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join-Login</title>

    <link rel="shortcut icon" href="./assets/icons/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/page-transitions.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/index.css">

    <script src="./script.js" defer></script>
    <script src="./scripts/index.js" defer></script>
</head>

<body class="login-page intro-running">
    <div class="intro-layer" aria-hidden="true">
        <picture>
            <source media="(width <= 768px)" srcset="./assets/icons/join-logo-light.png">
            <img class="intro-logo" src="./assets/icons/join-logo-dark.png" alt="">
        </picture>
    </div>

    <div class="login-content">
        <header class="login-header">
            <img id="loginLogo" class="login-logo" src="./assets/icons/join-logo-dark.png" alt="Join Logo">
        </header>

        <main class="login-main">
            <form class="card" id="loginForm" novalidate>
                <h1>Log in</h1>
                <div class="input-wrap margin-bottom">
                    <label class="visually-hidden" for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" autocomplete="email">
                    <img src="./assets/icons/mail.png" class="icon" alt="">
                </div>
                <div class="input-wrap">
                    <label class="visually-hidden" for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password"
                        autocomplete="current-password">
                    <button id="togglePasswordButton" class="icon-toggle" type="button"
                        aria-label="Show password">
                        <img src="./assets/icons/lock.png" id="toggleIcon" alt="">
                    </button>
                </div>
                <p id="errorMessage" class="error-msg" aria-live="polite"></p>
                <div class="btn-row">
                    <button class="login-btn" type="submit">Log in</button>
                    <button class="guest-btn" type="button">Guest Log in</button>
                </div>
            </form>
        </main>

        <div class="signup-area">
            <span>Not a Join user?</span>
            <a class="signup-btn" href="./subpages/sign-up.html">Sign up</a>
        </div>

        <footer class="login-footer">
            <a href="./subpages/privacy-policy.html">Privacy Policy</a>
            <a href="./subpages/legal-notice.html">Legal Notice</a>
        </footer>
    </div>
</body>

</html>
