<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.webp" type="image/x-icon" />

    <link rel="stylesheet" href="../styles/variables.css" />
    <link rel="stylesheet" href="../styles/assets.css" />
    <link rel="stylesheet" href="../styles/fonts.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/board.css" />
    <link rel="stylesheet" href="../styles/boardDialogs.css" />
    <link rel="stylesheet" href="../styles/boardAddTaskDialog.css" />
    <link rel="stylesheet" href="../styles/boardOpenTaskDialog.css" />
    <link rel="stylesheet" href="../styles/boardEditTaskDialog.css" />
    <link rel="stylesheet" href="../style.css" />

    <script src="../script.js" defer></script>
    <script src="../scripts/taskInteractionHelper.js" defer></script>
    <script src="../templates/barsTemplates.js" defer></script>
    <script src="../scripts/bars.js" defer></script>
    <script src="../scripts/taskDataAccess.js" defer></script>
    <script src="../scripts/dialogManager.js" defer></script>
    <script src="../templates/boardAddTaskTemplates.js" defer></script>
    <script src="../templates/boardOpenTaskTemplates.js" defer></script>
    <script src="../templates/boardEditTaskTemplates.js" defer></script>
    <script src="../scripts/board.js" defer></script>
    <script src="../scripts/boardTaskMovement.js" defer></script>
    <script src="../scripts/boardDialogs.js" defer></script>
    <script src="../scripts/boardAddTaskDialogHelpers.js" defer></script>
    <script src="../scripts/taskDropdownHelper.js" defer></script>
    <script src="../scripts/boardTaskDialogContacts.js" defer></script>
    <script src="../scripts/boardAddTaskDialogDate.js" defer></script>
    <script src="../scripts/boardAddTaskDialog.js" defer></script>
    <script src="../scripts/boardOpenTaskDialog.js" defer></script>
    <script src="../scripts/boardEditTaskDialog.js" defer></script>
</head>

<body data-page="board">
    <aside id="sidebar" class="sidebar"></aside>

    <section class="page-content" aria-label="Seiteninhalt">
        <header id="topbar" class="topbar"></header>

        <main class="main-content board-main">
            <section class="board">
                <article class="board-header">
                    <h1>Board</h1>
                    <div class="board-actions">
                        <label class="task-search" for="taskSearch">
                            <input id="taskSearch" type="search" placeholder="Find Task" />
                            <span class="search-divider" aria-hidden="true"></span>
                            <span class="search-icon-button">
                                <img class="search-icon" src="../assets/icons/searchIcon.webp" alt="" />
                            </span>
                        </label>
                        <button class="add-task-button" type="button" data-task-column="todo">
                            <span class="add-task-label">Add task</span>
                            <span class="add-task-plus" aria-hidden="true">+</span>
                        </button>
                    </div>
                </article>

                <article class="board-columns">
                    <div class="board-column">
                        <div class="column-header">
                            <h2>To do</h2>
                            <button class="add-column-task" type="button" data-task-column="todo"
                                aria-label="Add task to To do">
                                <img src="../assets/icons/addColumnTask.webp" alt="" />
                            </button>
                        </div>
                        <div class="task-list" id="toDoTasks"></div>
                    </div>

                    <div class="board-column">
                        <div class="column-header">
                            <h2>In progress</h2>
                            <button class="add-column-task" type="button" data-task-column="inprogress"
                                aria-label="Add task to In progress">
                                <img src="../assets/icons/addColumnTask.webp" alt="" />
                            </button>
                        </div>
                        <div class="task-list" id="inProgressTasks"></div>
                    </div>

                    <div class="board-column">
                        <div class="column-header">
                            <h2>Await feedback</h2>
                            <button class="add-column-task" type="button" data-task-column="awaitfeedback"
                                aria-label="Add task to Await feedback">
                                <img src="../assets/icons/addColumnTask.webp" alt="" />
                            </button>
                        </div>
                        <div class="task-list" id="awaitFeedbackTasks"></div>
                    </div>

                    <div class="board-column">
                        <div class="column-header">
                            <h2>Done</h2>
                        </div>
                        <div class="task-list" id="doneTasks"></div>
                    </div>
                </article>

                <p id="boardStatusMessage" class="visually-hidden" aria-live="polite"></p>
            </section>
        </main>
    </section>
</body>

</html>
