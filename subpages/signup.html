<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/assets.css">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/signup.css">
</head>

<body>
    <header>
        <img src="../assets/icons/join-logo-dark.png" alt="Join Logo">
    </header>
    <div class="div-textbox">
        <div class="text-box">
            <div class="textbox-div-signup">
                <span>Sign up</span>
            </div>
            <div div class="textbox-div-inputfield">
                <div class="textbox-inputfield">
                    <input type="text" placeholder="Name" id="username">
                    <input type="email" placeholder="Email" id="email">
                    <input type="password" placeholder="Password" id="password">
                    <input type="password" placeholder="Confirm Password" id="confirm-password">
                    <div class="textbox-div-checkbox">
                        <input class="checkbox" type="checkbox" id="terms-checkbox">
                        <label for="terms-checkbox">I accept the</label>
                        <p>Privacy Policy</p>
                    </div>

                </div>
            </div>

            <div class="div-btn">
                <button class="signup-btn">Sign up</button>
            </div>

        </div>
    </div>
    <footer></footer>
</body>

</html>
