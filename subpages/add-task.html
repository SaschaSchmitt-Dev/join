<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/add-task.css">
    <link rel="stylesheet" href="../styles/contacts.css">

    <script src="../templates/bars-templates.js" defer></script>
    <script src="../scripts/bars.js" defer></script>
</head>

<body data-page="add-task">
    <aside id="sidebar" class="sidebar"></aside>

    <section class="page-content" aria-label="Seiteninhalt">
        <header id="topbar" class="topbar"></header>

        <main class="main-content add-task-content">
            <h1 class="site-header">Add Task</h1>
            <form class="add-task-form">
                <div class="add-task-fields-left">
                    <label class="label" for="title">Title<span style="color: #FF8190">*</span></label>
                    <input class="input-field" type="text" required placeholder="Enter a title">
                    <label class="label-textarea" for="description">Description</label>
                    <textarea class="textarea" type="text" placeholder="Enter a Description"></textarea>
                    <label class="label" for="due-date">Due date<span style="color: #FF8190">*</span></label>
                    <input class="input-field" type="text" required placeholder="dd/mm/yyy">
                </div>
                <div class="horizontal-divider"></div>
                <div class="add-task-fields-right">
                    <label for="priority">Priority</label>
                    <div class="priority-group">
                            <input type="radio" name="priority" id="urgent" value="urgent">
                            <label id="urgent" for="urgent">Urgent <img src="../assets/icons/urgent-priority.png" alt=""></label>
                        
                            <input type="radio" name="priority" id="medium" value="medium">
                            <label id="medium" for="medium">Medium <img src="../assets/icons/medium-priority.png" alt=""></label>
                        
                            <input type="radio" name="priority" id="low" value="low">
                            <label id="low" for="low">Low <img src="../assets/icons/low-priority.png" alt=""></label>
                    </div>
                </div>

            </form>
        </main>

    </section>
</body>

</html>
