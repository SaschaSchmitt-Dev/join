<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/assets.css">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/signup.css">
    <script src="../script.js" defer></script>
    <script src="../scripts/sign-up.js" defer></script>
</head>

<body>
    <header>
        <img src="../assets/icons/join-logo-dark.png" alt="Join logo">
    </header>

    <main class="signup-main">
        <div class="textbox">
            <div class="text-box">

                <a class="back-to-login" href="../subpages/login.html" aria-label="Back to login">
                    <img src="../assets/icons/arrow-left-signup.png" alt="" aria-hidden="true">
                </a>

                <div class="textbox-signup">
                    <span>Sign up</span>
                </div>

                <div class="textbox-inputfield-wrapper">
                    <form id="signup-form" class="textbox-inputfield">

                        <div class="signup-input-field">
                            <input type="text" placeholder="Name" id="username" required>
                            <img src="../assets/icons/person.png" alt="" aria-hidden="true">
                        </div>

                        <div class="signup-input-field">
                            <input type="email" placeholder="Email" id="email" required>
                            <img src="../assets/icons/mail.png" alt="" aria-hidden="true">
                        </div>

                        <div class="signup-input-field">
                            <input type="password" placeholder="Password" id="password" required>
                            <img src="../assets/icons/lock.png" alt="" aria-hidden="true" id="password-icon">
                        </div>

                        <div class="signup-input-field">
                            <input type="password" placeholder="Confirm Password" id="confirm-password" required>
                            <img src="../assets/icons/lock.png" alt="" aria-hidden="true" id="confirm-password-icon">
                        </div>

                        <p id="errorMessage" class="error-msg" aria-live="polite"></p>

                        <div class="textbox-checkbox">
                            <input class="checkbox" type="checkbox" id="terms-checkbox">
                            <label for="terms-checkbox">I accept the</label>
                            <a href="./privacy-policy.html">Privacy policy</a>
                        </div>

                        <div class="btn">
                            <button id="signup-btn" class="signup-btn" type="submit" disabled>
                                Sign up
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./legal-notice.html">Legal notice</a>
    </footer>

    <div class="signup-toast">
        <span>You Signed Up successfully</span>
    </div>
</body>

</html>
