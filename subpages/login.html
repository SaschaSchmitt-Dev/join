<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join-Login</title>

    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../styles/assets.css">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/login.css">

    <script src="../scripts/login.js" defer></script>
    <script src="../script.js" defer></script>
</head>

<body>
    <header>
        <img src="../assets/icons/join-logo-dark.png" alt="Join Logo">
        <div>
            <span>Not a Join user </span>
            <button class="signup-btn">Sign up</button>
        </div>
    </header>

    <div class="card-wrapper">
  <div class="card">
    <h1>Log in</h1>
    <div class="input-wrap">
      <input type="email" placeholder="Email">
      <img src="../assets/icons/mail.png" class="icon" alt="mail">
    </div>
    <div class="input-wrap">
      <input type="password" placeholder="Password">
      <span class="icon">&#128274;</span>
    </div>
    <div class="btn-row">
      <button class="login-btn">Log in</button>
      <button class="guest-btn">Guest Log in</button>
    </div>
  </div>
</div>

<footer>
  <a href="..//subpages/privacy-policy.html">Privacy Policy</a> · <a href="..//subpages/legal-notice.html">Legal notice</a>
</footer>

</body>

</html>
